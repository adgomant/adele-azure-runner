# ── Azure connections (set once per environment) ──────────────
azure:
  foundry:
    endpoint: "https://adele-new-models-eastus.services.ai.azure.com/models"
    api_key_env: "AZURE_AI_API_KEY"
  batch:
    endpoint: "https://annotations-idk-westeurope.openai.azure.com/"
    api_key_env: "AZURE_OPENAI_API_KEY"
    api_version:  "2024-12-01-preview"
    completion_endpoint: "/chat/completions"
    max_requests_per_file: 99000     # Max requests per batch file (Azure limit: 100000)
    max_bytes_per_file: 190000000    # Max bytes per batch file (Azure limit: 200000000)

# ── Run settings ──────────────────────────────────────────────
run:
  run_id: "adele_dev_run"
  output_dir: "runs"

dataset:
  name: "adele"
  hf_id: "CFI-Kinds-of-Intelligence/ADeLe_battery_v1dot0"
  split: "train"
  limit: 10           # set null for full dataset

# ── Inference ─────────────────────────────────────────────────
inference:
  mode: "foundry"         # "foundry" | "batch"
  model: "Llama-4-Maverick-17B-128E-Instruct-FP8" # model name or deployment (--model overrides)
  temperature: 0.0
  max_tokens: 2048
  top_p: 1.0
  rate_limits:                    # Optional: auto-tunes concurrency params (foundry only)
    tokens_per_minute: 100000
    requests_per_minute: 100

# ── Judging ───────────────────────────────────────────────────
judging:
  enabled: true
  prompt_template: "v1"      # "v1" (JSON output) or "v2" (bare integer score)
  judges:
    # - name: "gpt4o"
      # provider: "foundry"       # "foundry" (async) or "batch" (Azure OpenAI Batch API)
      # model: "gpt-4o-20241201"
      # rate_limits:            # Optional: per-judge rate limits (foundry only)
      #   tokens_per_minute: 80000
      #   requests_per_minute: 300
    # - name: "claude"
    #   provider: "foundry"
    #   model: "<FOUNDRY_CLAUDE_MODEL_ID>"
    - name: "judge-gpt4o"
      provider: "batch"       # "foundry" (async) or "batch" (Azure OpenAI Batch API)
      model: "gpt-4o-2024-05-13-global-batch"

# ── Advanced ──────────────────────────────────────────────────
concurrency:
  max_in_flight: 16
  request_timeout_s: 120
  max_retries: 6
  backoff_base_s: 1.0
  backoff_max_s: 30.0
  max_poll_time_s: 3600             # max seconds to wait for a batch job
  batch_completion_window: "24h"

pricing:
  enabled: true
  models:
    # Inference model pricing
    judge-gpt4o:
      prompt_per_1k: 0.00125     # USD per 1K prompt tokens
      completion_per_1k: 0.005
    Llama-4-Maverick-17B-128E-Instruct-FP8:
      prompt_per_1k: 0.00025
      completion_per_1k: 0.001

logging:
  level: "INFO"
