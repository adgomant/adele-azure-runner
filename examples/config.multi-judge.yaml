# Config with multiple judges across request-response and batch modes, v2 template, and pricing.
#
# Usage:
#   cp examples/config.multi-judge.yaml config.yaml
#   export AZURE_AI_API_KEY="<your-foundry-key>"
#   export AZURE_OPENAI_API_KEY="<your-aoai-key>"
#   uv run adele-runner run-all --model gpt-4o

providers:
  azure_ai_inference:
    endpoint: "https://<YOUR-RESOURCE>.services.ai.azure.com/models"
    api_key_env: "AZURE_AI_API_KEY"
  azure_openai:
    endpoint: "https://<YOUR-AOAI-RESOURCE>.openai.azure.com"
    api_key_env: "AZURE_OPENAI_API_KEY"
    api_version: "<API_VERSION>"

targets:
  gpt-4o-batch:
    supported_modes: ["batch"]
    batch_capable: true

run:
  run_id: "multi_judge_run"
  output_dir: "runs"

dataset:
  hf_id: "CFI-Kinds-of-Intelligence/ADeLe_battery_v1dot0"
  split: "train"
  limit: 50

inference:
  provider: "azure_ai_inference"
  mode: "auto"
  model: ""
  temperature: 0.0
  max_tokens: 2048

concurrency:
  max_in_flight: 16
  max_poll_time_s: 3600

judging:
  enabled: true
  prompt_template: "v2"           # bare-integer scoring (1-5)
  judges:
    - name: "gpt4o-foundry"
      provider: "azure_ai_inference"
      mode: "request_response"
      model: "gpt-4o"
      # max_tokens: 512         # Max completion tokens (default: 512)
    - name: "claude-foundry"
      provider: "azure_ai_inference"
      mode: "request_response"
      model: "claude-3-opus"
    - name: "gpt4o-batch"
      provider: "azure_openai"
      mode: "batch"
      model: "gpt-4o-batch"

pricing:
  enabled: true
  models:
    gpt-4o:
      prompt_per_1k: 2.50         # USD per 1K prompt tokens
      completion_per_1k: 10.00
    claude-3-opus:
      prompt_per_1k: 15.00
      completion_per_1k: 75.00

logging:
  level: "INFO"
