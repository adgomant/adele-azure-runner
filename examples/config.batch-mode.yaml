# Config with Azure OpenAI batch mode enabled for inference and one batch judge.
#
# Usage:
#   cp examples/config.batch-mode.yaml config.yaml
#   export AZURE_AI_API_KEY="<your-azure-ai-inference-key>"
#   export AZURE_OPENAI_API_KEY="<your-aoai-key>"
#   uv run adele-runner run-all --model gpt-4o

providers:
  azure_ai_inference:
    endpoint: "https://<YOUR-RESOURCE>.services.ai.azure.com/models"
    api_key_env: "AZURE_AI_API_KEY"
  azure_openai:
    endpoint: "https://<YOUR-AOAI-RESOURCE>.openai.azure.com"
    api_key_env: "AZURE_OPENAI_API_KEY"
    api_version: "<API_VERSION>"

targets:
  "<DEPLOYMENT_NAME>":
    supported_modes: ["batch"]
    batch_capable: true

run:
  run_id: "batch_mode_run"
  output_dir: "runs"

dataset:
  hf_id: "CFI-Kinds-of-Intelligence/ADeLe_battery_v1dot0"
  split: "train"
  limit: 50

inference:
  provider: "azure_openai"
  mode: "batch"
  model: "<DEPLOYMENT_NAME>"
  temperature: 0.0
  max_tokens: 2048

concurrency:
  max_in_flight: 16
  max_poll_time_s: 3600           # 1 hour timeout for batch polling
  batch_completion_window: "24h"

judging:
  enabled: true
  prompt_template: "v1"
  judges:
    - name: "gpt4o-batch"
      provider: "azure_openai"
      mode: "batch"
      model: "<DEPLOYMENT_NAME>"

logging:
  level: "INFO"
