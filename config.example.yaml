# ── Azure connections (set once per environment) ──────────────
azure:
  foundry:
    endpoint: "https://<YOUR-RESOURCE>.services.ai.azure.com/models"
    api_key_env: "AZURE_AI_API_KEY"
  batch:
    endpoint: "https://<YOUR-AOAI-RESOURCE>.openai.azure.com"
    api_key_env: "AZURE_OPENAI_API_KEY"
    api_version: "<API_VERSION>"
    completion_endpoint: "/chat/completions"

# ── Run settings ──────────────────────────────────────────────
run:
  run_id: "adele_dev_run"
  output_dir: "runs"

dataset:
  name: "adele"
  hf_id: "CFI-Kinds-of-Intelligence/ADeLe_battery_v1dot0"
  split: "train"
  limit: 50           # set null for full dataset

# ── Inference ─────────────────────────────────────────────────
inference:
  mode: "auto"         # "auto" | "foundry" | "batch"
  model: ""            # model name or deployment (--model overrides)
  temperature: 0.0
  max_tokens: 50000
  top_p: 1.0

# ── Judging ───────────────────────────────────────────────────
judging:
  enabled: true
  prompt_template: "v1"      # "v1" (JSON output) or "v2" (bare integer score)
  judges:
    - name: "gpt4o"
      provider: "foundry"       # "foundry" (async) or "batch" (Azure OpenAI Batch API)
      model: "<FOUNDRY_GPT4O_MODEL_ID>"
    - name: "claude"
      provider: "foundry"
      model: "<FOUNDRY_CLAUDE_MODEL_ID>"
    # - name: "gpt-4o-batch"
    #   provider: "batch"       # uses azure.batch connection settings
    #   model: "gpt-4o"

# ── Advanced ──────────────────────────────────────────────────
concurrency:
  max_in_flight: 16
  request_timeout_s: 120
  max_retries: 6
  backoff_base_s: 1.0
  backoff_max_s: 30.0
  max_poll_time_s: 3600             # max seconds to wait for a batch job
  batch_completion_window: "24h"

pricing:
  enabled: false
  models:
    # Inference model pricing
    # gpt-4o:
    #   prompt_per_1k: 2.50     # USD per 1K prompt tokens
    #   completion_per_1k: 10.00
    # Judge pricing (key must match judging.judges[].name)
    # gpt4o:
    #   prompt_per_1k: 2.50
    #   completion_per_1k: 10.00

logging:
  level: "INFO"
