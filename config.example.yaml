# ── Provider connections (set once per environment) ───────────
providers:
  azure_ai_inference:
    endpoint: "https://<YOUR-RESOURCE>.services.ai.azure.com/models"
    api_key_env: "AZURE_AI_API_KEY"
  azure_openai:
    endpoint: "https://<YOUR-AOAI-RESOURCE>.openai.azure.com"
    api_key_env: "AZURE_OPENAI_API_KEY"
    api_version: "<API_VERSION>"
    completion_endpoint: "/chat/completions"
    max_requests_per_file: 100000    # Azure hard limit: 100000
    max_bytes_per_file: 200000000    # Azure hard limit: 200000000
  google_genai:
    api_key_env: "GEMINI_API_KEY"
    backend: "gemini_api"            # "gemini_api" | "vertex_ai"
    # project: "<GCP_PROJECT>"       # required for vertex_ai
    # location: "us-central1"        # required for vertex_ai
  anthropic:
    api_key_env: "ANTHROPIC_API_KEY"

targets:
  # gpt-4o-batch:
  #   supported_modes: ["batch"]
  #   batch_capable: true
  #   deployment_type: "global_batch"

# ── Run settings ──────────────────────────────────────────────
run:
  run_id: "adele_dev_run"
  output_dir: "runs"

dataset:
  name: "adele"
  hf_id: "CFI-Kinds-of-Intelligence/ADeLe_battery_v1dot0"
  split: "train"
  limit: 50           # set null for full dataset

# ── Inference ─────────────────────────────────────────────────
inference:
  provider: "azure_ai_inference"   # exact SDK to use
  mode: "auto"                     # "request_response" | "batch" | "auto"
  model: ""            # model name or deployment (--model overrides)
  temperature: 0.0
  max_tokens: 50000
  top_p: 1.0
  # rate_limits:                    # Optional request-response or batch budgets
  #   tokens_per_minute: 80000
  #   requests_per_minute: 300
  #   concurrent_requests: 32
  #   requests_per_day: 10000
  #   batch_enqueued_tokens: 200000000

# ── Judging ───────────────────────────────────────────────────
judging:
  enabled: true
  prompt_template: "v1"      # "v1" (JSON output) or "v2" (bare integer score)
  judges:
    - name: "gpt4o"
      provider: "azure_ai_inference"
      mode: "request_response"
      model: "<FOUNDRY_GPT4O_MODEL_ID>"
      # max_tokens: 512         # Max completion tokens for this judge (default: 512)
      # rate_limits:            # Optional request-response or batch budgets
      #   tokens_per_minute: 80000
      #   requests_per_minute: 300
    - name: "claude"
      provider: "azure_ai_inference"
      mode: "request_response"
      model: "<FOUNDRY_CLAUDE_MODEL_ID>"
    # - name: "gpt-4o-batch"
    #   provider: "azure_openai"
    #   mode: "batch"
    #   model: "gpt-4o-batch"
    #   rate_limits:
    #     batch_enqueued_tokens: 50000000

# ── Advanced ──────────────────────────────────────────────────
concurrency:
  max_in_flight: 16
  request_timeout_s: 120
  max_retries: 6
  backoff_base_s: 1.0
  backoff_max_s: 30.0
  max_poll_time_s: 3600             # max seconds to wait for a batch job
  batch_completion_window: "24h"

pricing:
  enabled: false
  models:
    # Inference model pricing
    # gpt-4o:
    #   prompt_per_1k: 2.50     # USD per 1K prompt tokens
    #   completion_per_1k: 10.00
    # Judge pricing (key must match judging.judges[].name)
    # gpt4o:
    #   prompt_per_1k: 2.50
    #   completion_per_1k: 10.00

logging:
  level: "INFO"
